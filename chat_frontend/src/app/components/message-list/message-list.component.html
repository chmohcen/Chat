<div class="messages-container" #messagesContainer>
  <div class="messages-empty" *ngIf="messages.length === 0">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
    </svg>
    <p class="messages-empty__title">No messages yet</p>
    <p class="messages-empty__subtitle">Say hi to start the conversation 👋</p>
  </div>

  <div class="messages" *ngIf="messages.length > 0">
    <ng-container *ngFor="let message of messages; let i = index">
      <!-- Timestamp divider for message groups -->
      <div class="message-divider">
        <span>{{ message.timestamp | date: 'MMM d, HH:mm' }}</span>
      </div>

      <!-- Message bubble -->
      <div class="message" [class.message--own]="message.isOwn" [class.message--other]="!message.isOwn">
        <div *ngIf="!message.isOwn" class="message__picture">
          <img [src]="message.sender.picture" alt="Picture">
        </div>

        <div class="message__content">
          <div class="message__bubble">
            <p class="message__text">{{ message.content }}</p>
          </div>
          <div class="message__meta">
            <span class="message__time">{{ formatTime(message.timestamp) }}</span>
            <span *ngIf="message.isOwn" class="message__status">
              <svg *ngIf="message.isRead" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <polyline points="20 6 9 17 4 12"></polyline>
                <polyline points="24 6 13 17 8 12"></polyline>
              </svg>
              <svg *ngIf="!message.isRead" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
          </div>
        </div>
      </div>
    </ng-container>
  </div>
</div>
