<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Login</h1>
      <p>Enter your email and password to continue.</p>
    </div>
    <form (ngSubmit)="onSubmit()" class="auth-form">
      <label>
        <span>Email</span>
        <input type="email" name="email" placeholder="you@example.com" required [(ngModel)]="email" />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" placeholder="••••••••" required [(ngModel)]="password" />
      </label>
      <button type="submit" class="auth-button">Sign In</button>
    </form>
    <div class="auth-footer">
      <span>Don't have an account?</span>
      <a routerLink="/signup">Create account</a>
    </div>
  </div>
</div>
