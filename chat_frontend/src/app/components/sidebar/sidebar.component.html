<div class="sidebar">
  <!-- Header -->
  <div class="sidebar__header">
    <span  class="user-profile" *ngIf="currentUser$ | async as user" (click)="openSettingsModal()">
      <img [src]="user.avatar" alt="User Avatar" class="user-profile__avatar">
      <div class="user-profile__status" [style.background-color]="getStatusColor(user.status)"></div>
    </span>
    <div class="sidebar__actions">
      <button class="action-btn" title="Start new chat">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Search -->
  <div class="sidebar__search">
    <input
      type="text"
      placeholder="Search conversations..."
      class="search-input"
      [(ngModel)]="searchQuery"
      (input)="onSearch(searchQuery)"
    >
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-input__icon">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
  </div>

  <!-- Chat List -->
  <div class="sidebar__chats">
    <div
      *ngFor="let chat of filteredChats$ | async"
      class="chat-item"
      [class.chat-item--active]="selectedChatId === chat.id"
      (click)="selectChat(chat)"
    >
      <div class="chat-item__avatar-wrapper">
        <img [src]="chat.participants[0].avatar" alt="Chat Avatar" class="chat-item__avatar">
        <div
          class="chat-item__status"
          [style.background-color]="getStatusColor(chat.participants[0].status)"
        ></div>
      </div>

      <div class="chat-item__content">
        <div class="chat-item__header">
          <h3 class="chat-item__name">{{ chat.participants[0].name }}</h3>
          <span class="chat-item__time">
            {{ chat.lastMessageTime | date: 'short' }}
          </span>
        </div>
        <p class="chat-item__message">{{ chat.lastMessage }}</p>
      </div>

      <div *ngIf="chat.unreadCount > 0" class="chat-item__badge">
        {{ chat.unreadCount }}
      </div>
    </div>
  </div>
</div>

<div class="settings-modal-backdrop" *ngIf="isSettingsOpen" (click)="closeSettingsModal()">
  <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="user-settings-title" (click)="$event.stopPropagation()">
    <div class="settings-modal__header">
      <div>
        <p class="settings-modal__eyebrow">Profile</p>
        <h3 id="user-settings-title">User settings</h3>
      </div>
      <button type="button" class="settings-modal__close" (click)="closeSettingsModal()" aria-label="Close settings">×</button>
    </div>

    <form class="settings-form" (ngSubmit)="saveSettings()">
      <label class="settings-field">
        <span>Name</span>
        <input type="text" name="name" [(ngModel)]="settingsForm.name" placeholder="Your name" />
      </label>

      <label class="settings-field">
        <span>Email</span>
        <input type="email" name="email" [(ngModel)]="settingsForm.email" placeholder="you@example.com" />
      </label>

      <label class="settings-field">
        <span>Picture</span>
        <div class="settings-field__upload">
          <input type="text" name="avatar" [(ngModel)]="settingsForm.avatar" placeholder="Image URL" />
          <input type="file" accept="image/*" (change)="onAvatarFileChange($event)" />
        </div>
      </label>

      <label class="settings-field">
        <span>Password</span>
        <input type="password" name="password" [(ngModel)]="settingsForm.password" placeholder="New password" />
      </label>

      <div class="settings-field">
        <span>Status</span>
        <div class="settings-status">
          <label class="settings-status__option" *ngFor="let option of statusOptions">
            <input type="radio" name="status" [value]="option.value" [(ngModel)]="settingsForm.status" />
            <span>{{ option.label }}</span>
          </label>
        </div>
      </div>

      <div class="settings-modal__actions">
        <button type="button" class="settings-modal__cancel" (click)="closeSettingsModal()">Cancel</button>
        <button type="submit" class="settings-modal__save">Save</button>
      </div>
    </form>
  </div>
</div>
